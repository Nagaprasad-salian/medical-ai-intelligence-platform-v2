version: "3.9"

services:
  backend:
    build: .
    container_name: medical-ai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./saved_models:/app/saved_models
      - ./static:/app/static
      - ./db:/app/db
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped

  frontend:
    build: .
    container_name: medical-ai-frontend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
